<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>How to Play</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #2c2c2c; /* พื้นหลังสีเข้มช่วยให้ PDF เด่น */
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #pdf-container {
            width: 100%;
            max-width: 900px; /* จำกัดความกว้างไม่ให้ใหญ่เกินไปในคอม */
        }
        canvas {
            display: block;
            width: 100% !important; /* บังคับ Responsive เต็มจอโทรศัพท์ */
            height: auto !important;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div id="pdf-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script>
    // ระบุชื่อไฟล์ที่มีช่องว่าง
    const url = 'How to play.pdf'; 

    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    const container = document.getElementById('pdf-container');

    // เริ่มต้นการดึงไฟล์ PDF
    pdfjsLib.getDocument(url).promise.then(pdf => {
        console.log('PDF loaded');
        
        // วนลูปสร้างหน้า PDF ทุกหน้าออกมาเป็น Canvas
        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
            pdf.getPage(pageNum).then(page => {
                const scale = 2; // เพิ่มความละเอียดของภาพ (ชัดกว่ามาตรฐาน)
                const viewport = page.getViewport({ scale: scale });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderContext = {
                    canvasContext: context,
                    viewport: viewport
                };
                
                container.appendChild(canvas);
                page.render(renderContext);
            });
        }
    }).catch(err => {
        console.error('Error loading PDF: ', err);
        document.body.innerHTML = '<p style="color:white; padding:20px;">ไม่พบไฟล์ "How to play.pdf" กรุณาเช็คชื่อไฟล์บน GitHub</p>';
    });
</script>
</body>
</html>
